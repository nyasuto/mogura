<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mogura - Disk Usage Report</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; }
        .header { padding: 20px 24px; background: #16213e; border-bottom: 1px solid #0f3460; }
        .header h1 { font-size: 1.4rem; color: #e94560; }
        .header .meta { font-size: 0.85rem; color: #888; margin-top: 4px; }
        .container { display: flex; flex-direction: column; padding: 16px 24px; gap: 16px; }
        #treemap { width: 100%; height: 600px; background: #16213e; border-radius: 8px; overflow: hidden; position: relative; }
        .legend { display: flex; flex-wrap: wrap; gap: 12px; padding: 8px 0; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
        .legend-color { width: 14px; height: 14px; border-radius: 3px; }
        .treemap-node { position: absolute; overflow: hidden; border: 1px solid rgba(0,0,0,0.3); cursor: default; }
        .treemap-node .node-label { padding: 4px 6px; font-size: 11px; line-height: 1.3; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.6); pointer-events: none; }
        .treemap-node .node-label .node-name { font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .treemap-node .node-label .node-size { font-size: 10px; opacity: 0.85; display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Mogura - Disk Usage Report</h1>
        <div class="meta" id="meta"></div>
    </div>
    <div class="container">
        <div class="legend" id="legend"></div>
        <div id="treemap"></div>
    </div>
    <script>
        const data = {{.DataJSON}};

        function formatSize(bytes) {
            if (bytes >= 1024 * 1024 * 1024 * 1024) return (bytes / (1024 * 1024 * 1024 * 1024)).toFixed(1) + " TB";
            if (bytes >= 1024 * 1024 * 1024) return (bytes / (1024 * 1024 * 1024)).toFixed(1) + " GB";
            if (bytes >= 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + " MB";
            if (bytes >= 1024) return (bytes / 1024).toFixed(1) + " KB";
            return bytes + " B";
        }

        var metaEl = document.getElementById("meta");
        metaEl.textContent = "Total: " + formatSize(data.total_size) + " — Scanned at: " + new Date(data.scanned_at).toLocaleString("ja-JP");

        var categoryColors = {
            "動画": "#e94560",
            "画像": "#f5a623",
            "コード": "#50c878",
            "ドキュメント": "#4a90d9",
            "キャッシュ": "#9b59b6",
            "アーカイブ": "#e67e22",
            "その他": "#7f8c8d"
        };

        function getCategoryColor(node) {
            var d = node.data || node;
            if (d.dominant_category && categoryColors[d.dominant_category]) {
                return categoryColors[d.dominant_category];
            }
            return categoryColors["その他"];
        }

        var legendEl = document.getElementById("legend");
        Object.keys(categoryColors).forEach(function(cat) {
            var item = document.createElement("div");
            item.className = "legend-item";
            var swatch = document.createElement("div");
            swatch.className = "legend-color";
            swatch.style.backgroundColor = categoryColors[cat];
            item.appendChild(swatch);
            item.appendChild(document.createTextNode(cat));
            legendEl.appendChild(item);
        });

        var container = document.getElementById("treemap");
        var width = container.clientWidth;
        var height = container.clientHeight;

        var tree = data.dir_tree;
        if (!tree.children || tree.children.length === 0) {
            tree.children = [{ name: tree.name, size: tree.size, file_count: tree.file_count }];
        }

        var root = d3.hierarchy(tree)
            .sum(function(d) { return d.children && d.children.length > 0 ? 0 : d.size; })
            .sort(function(a, b) { return b.value - a.value; });

        d3.treemap()
            .size([width, height])
            .paddingInner(2)
            .paddingOuter(2)
            .round(true)(root);

        var leaves = root.leaves();

        leaves.forEach(function(leaf, i) {
            var div = document.createElement("div");
            div.className = "treemap-node";
            div.style.left = leaf.x0 + "px";
            div.style.top = leaf.y0 + "px";
            div.style.width = (leaf.x1 - leaf.x0) + "px";
            div.style.height = (leaf.y1 - leaf.y0) + "px";

            div.style.backgroundColor = getCategoryColor(leaf);

            var nodeW = leaf.x1 - leaf.x0;
            var nodeH = leaf.y1 - leaf.y0;

            if (nodeW > 30 && nodeH > 20) {
                var label = document.createElement("div");
                label.className = "node-label";
                var nameSpan = document.createElement("span");
                nameSpan.className = "node-name";
                nameSpan.textContent = leaf.data.name;
                label.appendChild(nameSpan);
                if (nodeH > 35) {
                    var sizeSpan = document.createElement("span");
                    sizeSpan.className = "node-size";
                    sizeSpan.textContent = formatSize(leaf.data.size);
                    label.appendChild(sizeSpan);
                }
                div.appendChild(label);
            }

            container.appendChild(div);
        });
    </script>
</body>
</html>
